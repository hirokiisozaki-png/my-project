<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>浦瀬さん定例mtg 議事録 ─ 三浦工業</title>
<style>
  :root {
    --ink: #1e2a38;
    --ink-sub: #4a5568;
    --ink-muted: #8896a5;
    --accent: #0f6e56;
    --accent-light: #e1f5ee;
    --accent-mid: #1d9e75;
    --border: #d1dce8;
    --surface: #f8fafc;
    --white: #ffffff;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: "Hiragino Sans", "Meiryo", "Arial", sans-serif;
    font-size: 14px;
    color: var(--ink);
    background: var(--white);
    line-height: 1.7;
  }
  .page {
    max-width: 800px;
    margin: 0 auto;
    padding: 48px 40px 80px;
  }
  .doc-header {
    border-bottom: 3px solid var(--accent);
    padding-bottom: 20px;
    margin-bottom: 32px;
  }
  .doc-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: .12em;
    color: var(--accent-mid);
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .doc-title {
    font-size: 24px;
    font-weight: 700;
    color: var(--ink);
    line-height: 1.3;
    margin-bottom: 6px;
  }
  .doc-sub {
    font-size: 12.5px;
    color: var(--ink-muted);
  }

  /* ── 議事録エントリ ── */
  .entry {
    margin-bottom: 32px;
    padding-bottom: 28px;
    border-bottom: 1px solid var(--border);
  }
  .entry:last-child {
    border-bottom: none;
  }
  .entry-date {
    display: inline-block;
    font-size: 13px;
    font-weight: 700;
    color: var(--white);
    background: var(--accent);
    border-radius: 5px;
    padding: 3px 12px;
    margin-bottom: 14px;
  }
  ul.notes {
    list-style: none;
    padding: 0;
  }
  ul.notes li {
    background: var(--surface);
    border: 1px solid var(--border);
    border-left: 3px solid var(--accent);
    border-radius: 6px;
    padding: 14px 16px;
    margin-bottom: 10px;
    font-size: 13.5px;
    color: var(--ink-sub);
  }
  .action-tag {
    display: inline-block;
    font-size: 11px;
    font-weight: 600;
    color: var(--accent-mid);
    background: var(--accent-light);
    border-radius: 4px;
    padding: 2px 8px;
    margin-top: 6px;
  }
  .footer-note {
    margin-top: 48px;
    padding-top: 16px;
    border-top: 1px solid var(--border);
    font-size: 11.5px;
    color: var(--ink-muted);
  }
</style>
</head>
<body>
<div class="page">
  <div class="doc-header">
    <div class="doc-label">三浦工業 ／ 議事録</div>
    <div class="doc-title">浦瀬さん定例mtg 議事録</div>
    <div class="doc-sub">新しい回が上に追記されます</div>
  </div>

  <!-- ここから議事録エントリ（新しい回を上に追加） -->



  <div class="entry">
    <div class="entry-date">2026/7/1</div>
    <ul class="notes">
      <li>
        4足歩行型ロボットに関心のある会社あり（清水建設の病院を管理している方、東リも該当）
        <br><span class="action-tag">TODO：今後販売する計画があるのか確認しておく</span>
      </li>
      <li>
        TP30はいつ神戸支店に届くか
      </li>
    </ul>
  </div>

  <!-- ここまで議事録エントリ -->

  <div class="footer-note">
    ミラボット株式会社 社内資料ポータル ／ 三浦工業フォルダ配下・定例mtg議事録
  </div>
</div>
</body>
</html>
