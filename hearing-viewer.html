<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AGV/AMR ヒアリング回答ビューア</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/3.34.0/iconfont/tabler-icons.min.css">
<style>
:root{
  --bg:#f0f4f8;--surface:#fff;--surface2:#f8fafc;--border:#e2e8f0;
  --text:#1e293b;--text-sub:#64748b;--text-light:#94a3b8;
  --accent:#0f5fa8;--accent-light:#dbeafe;
  --green:#16a34a;--green-light:#dcfce7;
  --amber:#d97706;--amber-light:#fef3c7;
  --radius:10px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:"Hiragino Sans","Yu Gothic UI","Meiryo UI",sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
.header{background:var(--accent);color:white;padding:16px 24px;display:flex;align-items:center;gap:12px;box-shadow:0 2px 8px rgba(15,95,168,.3);}
.header h1{font-size:17px;font-weight:700;}
.header .sub{font-size:11px;opacity:.75;margin-top:2px;}
.header-icon{font-size:24px;}
.updated{font-size:11px;opacity:.6;margin-left:auto;}
.stats-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 24px;display:flex;gap:20px;flex-wrap:wrap;align-items:center;}
.stat-item{display:flex;align-items:center;gap:8px;}
.stat-num{font-size:22px;font-weight:700;color:var(--accent);}
.stat-label{font-size:11px;color:var(--text-sub);}
.stat-div{width:1px;height:32px;background:var(--border);}
.status-badge{font-size:10px;font-weight:700;padding:3px 8px;border-radius:4px;white-space:nowrap;}
.status-A{background:#dcfce7;color:#16a34a;}
.status-B{background:#dbeafe;color:#0f5fa8;}
.status-C{background:#fef3c7;color:#d97706;}
.controls{padding:14px 24px;display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
.filter-group{display:flex;align-items:center;gap:6px;}
.filter-label{font-size:12px;color:var(--text-sub);font-weight:600;white-space:nowrap;}
select,input[type=text]{height:34px;padding:0 10px;border:1px solid var(--border);border-radius:6px;font-size:13px;background:var(--surface);color:var(--text);outline:none;}
select:focus,input:focus{border-color:var(--accent);}
input[type=text]{width:190px;}
.btn{height:34px;padding:0 14px;background:var(--surface);border:1px solid var(--border);border-radius:6px;font-size:12px;color:var(--text-sub);cursor:pointer;display:flex;align-items:center;gap:4px;}
.btn:hover{background:var(--bg);}
.result-count{margin-left:auto;font-size:12px;color:var(--text-sub);background:var(--bg);padding:4px 10px;border-radius:20px;border:1px solid var(--border);}
.view-toggle{display:flex;background:var(--bg);border:1px solid var(--border);border-radius:6px;overflow:hidden;}
.view-btn{padding:5px 12px;font-size:12px;border:none;background:transparent;color:var(--text-sub);cursor:pointer;display:flex;align-items:center;gap:4px;}
.view-btn.active{background:var(--accent);color:white;}
.branch-section{padding:0 24px 16px;}
.branch-header{display:flex;align-items:center;gap:10px;padding:10px 16px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius) var(--radius) 0 0;border-bottom:2px solid var(--accent);margin-top:14px;cursor:pointer;user-select:none;}
.branch-header:hover{background:var(--surface2);}
.branch-name{font-size:15px;font-weight:700;color:var(--accent);}
.branch-count{font-size:12px;background:var(--accent-light);color:var(--accent);padding:2px 8px;border-radius:10px;font-weight:600;}
.branch-reps{font-size:12px;color:var(--text-sub);margin-left:auto;}
.chevron{color:var(--text-sub);font-size:16px;transition:transform .2s;}
.chevron.col{transform:rotate(-90deg);}
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(330px,1fr));border:1px solid var(--border);border-top:none;border-radius:0 0 var(--radius) var(--radius);overflow:hidden;}
.case-card{background:var(--surface);padding:14px;border-right:1px solid var(--border);border-bottom:1px solid var(--border);cursor:pointer;transition:background .15s;}
.case-card:hover{background:#f0f7ff;}
.card-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px;gap:8px;}
.customer-name{font-size:14px;font-weight:700;line-height:1.3;flex:1;}
.card-meta{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px;font-size:11px;color:var(--text-sub);}
.card-meta i{font-size:12px;}
.card-specs{display:grid;grid-template-columns:1fr 1fr;gap:4px 12px;padding:8px;background:var(--surface2);border-radius:6px;margin-bottom:8px;}
.spec-row{display:flex;flex-direction:column;}
.spec-label{font-size:10px;color:var(--text-light);}
.spec-val{font-size:12px;font-weight:600;}
.card-purpose{display:flex;flex-wrap:wrap;gap:3px;}
.purpose-tag{background:var(--bg);border:1px solid var(--border);padding:2px 6px;border-radius:3px;font-size:10px;}
.card-note{margin-top:8px;font-size:11px;color:var(--text-sub);background:#fffbeb;border-left:3px solid var(--amber);padding:6px 8px;border-radius:0 4px 4px 0;line-height:1.5;}
.card-footer{margin-top:8px;display:flex;justify-content:space-between;align-items:center;}
.budget-badge{font-size:12px;font-weight:700;color:var(--green);background:var(--green-light);padding:3px 8px;border-radius:4px;}
.date-label{font-size:11px;color:var(--text-light);}
.list-view{padding:0 24px 20px;}
.list-table{width:100%;border-collapse:collapse;background:var(--surface);border-radius:var(--radius);overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.08);font-size:12px;}
.list-table th{background:var(--accent);color:white;padding:10px 12px;text-align:left;font-weight:600;white-space:nowrap;font-size:11px;}
.list-table td{padding:9px 12px;border-bottom:1px solid var(--border);vertical-align:middle;cursor:pointer;}
.list-table tr:hover td{background:#f0f7ff;}
.list-table tr:last-child td{border-bottom:none;}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;padding:24px;overflow-y:auto;}
.modal-overlay.active{display:flex;align-items:flex-start;justify-content:center;}
.modal{background:var(--surface);border-radius:12px;max-width:660px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.2);overflow:hidden;}
.modal-header{background:var(--accent);color:white;padding:18px 24px;display:flex;justify-content:space-between;align-items:flex-start;}
.modal-title{font-size:16px;font-weight:700;line-height:1.3;}
.modal-sub{font-size:12px;opacity:.8;margin-top:3px;}
.modal-close{background:rgba(255,255,255,.2);border:none;color:white;width:28px;height:28px;border-radius:50%;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.modal-close:hover{background:rgba(255,255,255,.35);}
.modal-body{padding:20px;}
.modal-sec{margin-bottom:16px;}
.modal-sec-title{font-size:10px;font-weight:700;color:var(--text-sub);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px;padding-bottom:5px;border-bottom:1px solid var(--border);}
.modal-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
.modal-field{display:flex;flex-direction:column;gap:2px;}
.modal-field-label{font-size:10px;color:var(--text-light);}
.modal-field-val{font-size:13px;font-weight:600;}
.modal-note{background:#fffbeb;border:1px solid #fde68a;border-left:4px solid var(--amber);padding:10px 12px;border-radius:6px;font-size:13px;line-height:1.7;}
.modal-tags{display:flex;flex-wrap:wrap;gap:5px;}
.modal-tag{background:var(--accent-light);color:var(--accent);font-size:12px;font-weight:600;padding:3px 8px;border-radius:4px;}
.empty{text-align:center;padding:50px;color:var(--text-sub);}
.hidden{display:none!important;}
</style>
</head>

</div>

var view="card",filtered=DATA.slice();
function sc(s){if(!s)return"";if(s.indexOf("A")===0)return"status-A";if(s.indexOf("B")===0)return"status-B";if(s.indexOf("C")===0)return"status-C";return"";}
function ss(s){if(!s)return"";if(s.indexOf("A")===0)return"A：脈あり";if(s.indexOf("B")===0)return"B：比較検討";if(s.indexOf("C")===0)return"C：潜在ニーズ";return s;}
function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
function init(){
  var branches=[],reps=[],seen1={},seen2={};
  DATA.forEach(function(d){
    if(!seen1[d.branch]){seen1[d.branch]=1;branches.push(d.branch);}
    if(!seen2[d.rep]){seen2[d.rep]=1;reps.push(d.rep);}
  });
  branches.sort();reps.sort();
  var cnt={A:0,B:0,C:0};
  DATA.forEach(function(d){if(d.status.indexOf("A")===0)cnt.A++;else if(d.status.indexOf("B")===0)cnt.B++;else if(d.status.indexOf("C")===0)cnt.C++;});
  document.getElementById("statsBar").innerHTML=
    '<div class="stat-item"><div><div class="stat-num">'+DATA.length+'</div><div class="stat-label">総件数</div></div></div>'
    +'<div class="stat-div"></div>'
    +'<div class="stat-item"><div><div class="stat-num">'+branches.length+'</div><div class="stat-label">支店数</div></div></div>'
    +'<div class="stat-div"></div>'
    +'<div class="stat-item"><div><div class="stat-num">'+reps.length+'</div><div class="stat-label">担当者数</div></div></div>'
    +'<div class="stat-div"></div>'
    +'<div class="stat-item" style="gap:10px">'
    +'<span class="status-badge status-A" style="font-size:12px;padding:4px 10px">A '+cnt.A+'件</span>'
    +'<span class="status-badge status-B" style="font-size:12px;padding:4px 10px">B '+cnt.B+'件</span>'
    +'<span class="status-badge status-C" style="font-size:12px;padding:4px 10px">C '+cnt.C+'件</span></div>';
  var fb=document.getElementById("fBranch"),fr=document.getElementById("fRep");
  branches.forEach(function(b){var o=document.createElement("option");o.value=b;o.textContent=b;fb.appendChild(o);});
  reps.forEach(function(r){var o=document.createElement("option");o.value=r;o.textContent=r;fr.appendChild(o);});
}
function applyFilters(){
  var b=document.getElementById("fBranch").value,r=document.getElementById("fRep").value,
      s=document.getElementById("fStatus").value,q=document.getElementById("fSearch").value.toLowerCase();
  filtered=DATA.filter(function(d){
    if(b&&d.branch!==b)return false;
    if(r&&d.rep!==r)return false;
    if(s&&d.status.indexOf(s)!==0)return false;
    if(q&&d.customer.toLowerCase().indexOf(q)<0&&d.rep.toLowerCase().indexOf(q)<0)return false;
    return true;
  });
  document.getElementById("cnt").textContent=filtered.length+"件表示";
  renderView();
}
function reset(){["fBranch","fRep","fStatus"].forEach(function(id){document.getElementById(id).value="";});document.getElementById("fSearch").value="";applyFilters();}
function setView(v){view=v;document.getElementById("btnCard").classList.toggle("active",v==="card");document.getElementById("btnList").classList.toggle("active",v==="list");document.getElementById("cardView").classList.toggle("hidden",v!=="card");document.getElementById("listView").classList.toggle("hidden",v!=="list");renderView();}
function renderView(){if(view==="card")renderCards();else renderList();}
function renderCards(){
  var el=document.getElementById("cardView");
  if(!filtered.length){el.innerHTML='<div class="empty">条件に一致する案件がありません</div>';return;}
  var groups={};
  filtered.forEach(function(d){if(!groups[d.branch])groups[d.branch]=[];groups[d.branch].push(d);});
  var html="";
  Object.keys(groups).sort().forEach(function(br){
    var items=groups[br];
    var gid="g"+br.replace(/[^a-zA-Z0-9]/g,"");
    var repsArr=[];var repSeen={};
    items.forEach(function(i){if(!repSeen[i.rep]){repSeen[i.rep]=1;repsArr.push(i.rep);}});
    html+='<div class="branch-section">'
      +'<div class="branch-header" onclick="tog(\''+gid+'\',this)">'
      +'<i class="ti ti-building"></i>'
      +'<span class="branch-name">'+esc(br)+'</span>'
      +'<span class="branch-count">'+items.length+'件</span>'
      +'<span class="branch-reps">'+esc(repsArr.join("・"))+'</span>'
      +'<i class="ti ti-chevron-down chevron"></i></div>'
      +'<div class="cards-grid" id="'+gid+'">'
      +items.map(function(d){return cardHtml(d);}).join("")
      +'</div></div>';
  });
  el.innerHTML=html;
}
function cardHtml(d){
  var idx=DATA.indexOf(d);
  var purposes=d.purpose?d.purpose.split(",").map(function(p){return'<span class="purpose-tag">'+esc(p.trim())+'</span>';}).join(""):"";
  var hasBudget=d.budget&&["未定","未決定","検討中",""].indexOf(d.budget)<0;
  return '<div class="case-card" onclick="openModal('+idx+')">'
    +'<div class="card-top"><div class="customer-name">'+esc(d.customer)+'</div>'
    +'<span class="status-badge '+sc(d.status)+'">'+ss(d.status)+'</span></div>'
    +'<div class="card-meta"><span><i class="ti ti-user"></i>'+esc(d.rep)+'</span><span><i class="ti ti-map-pin"></i>'+esc(d.env)+'</span></div>'
    +'<div class="card-specs">'
    +'<div class="spec-row"><span class="spec-label">搬送重量</span><span class="spec-val">'+esc(d.weight||"—")+'</span></div>'
    +'<div class="spec-row"><span class="spec-label">稼働時間</span><span class="spec-val">'+esc(d.hours||"—")+'</span></div>'
    +'<div class="spec-row"><span class="spec-label">通路幅</span><span class="spec-val">'+esc(d.width||"—")+'</span></div>'
    +'<div class="spec-row"><span class="spec-label">段差</span><span class="spec-val">'+esc(d.slope||"—")+'</span></div>'
    +'</div>'
    +'<div class="card-purpose">'+purposes+'</div>'
    +(d.note?'<div class="card-note">'+esc(d.note)+'</div>':"")
    +'<div class="card-footer">'
    +(hasBudget?'<span class="budget-badge">\u00A5 '+esc(d.budget)+'</span>':'<span></span>')
    +'<span class="date-label">'+esc(d.date)+'</span></div>'
    +'</div>';
}
function tog(id,hdr){var g=document.getElementById(id);if(!g)return;var h=g.style.display==="none";g.style.display=h?"":"none";hdr.querySelector(".chevron").classList.toggle("col",!h);}
function renderList(){

  }).join("");

  document.getElementById("mSub").textContent=d.branch+" / "+d.rep+" / "+d.date;
  var purposes=d.purpose?d.purpose.split(",").map(function(p){return'<span class="modal-tag">'+esc(p.trim())+'</span>';}).join(""):"—";
  document.getElementById("mBody").innerHTML=
    '<div class="modal-sec"><div class="modal-sec-title">ステータス・スケジュール</div>'
    +'<div class="modal-grid">'
    +'<div class="modal-field"><span class="modal-field-label">ステータス</span><span class="modal-field-val"><span class="status-badge '+sc(d.status)+'" style="font-size:12px">'+esc(d.status||"—")+'</span></span></div>'
    +'<div class="modal-field"><span class="modal-field-label">導入検討時期</span><span class="modal-field-val">'+esc(d.timing||"—")+'</span></div>'
    +'<div class="modal-field"><span class="modal-field-label">ご予算</span><span class="modal-field-val">'+esc(d.budget||"—")+'</span></div>'
    +'</div></div>'
    +'<div class="modal-sec"><div class="modal-sec-title">現場スペック</div>'
    +'<div class="modal-grid">'
    +'<div class="modal-field"><span class="modal-field-label">走行エリア</span><span class="modal-field-val">'+esc(d.env||"—")+'</span></div>'
    +'<div class="modal-field"><span class="modal-field-label">通路幅</span><span class="modal-field-val">'+esc(d.width||"—")+'</span></div>'
    +'<div class="modal-field"><span class="modal-field-label">床面の状態</span><span class="modal-field-val">'+esc(d.floor||"—")+'</span></div>'
    +'<div class="modal-field"><span class="modal-field-label">温度環境</span><span class="modal-field-val">'+esc(d.temp||"—")+'</span></div>'
    +'<div class="modal-field"><span class="modal-field-label">搬送物</span><span class="modal-field-val">'+esc(d.cargo||"—")+'</span></div>'
    +'<div class="modal-field"><span class="modal-field-label">搬送重量</span><span class="modal-field-val">'+esc(d.weight||"—")+'</span></div>'
    +'<div class="modal-field"><span class="modal-field-label">稼働時間</span><span class="modal-field-val">'+esc(d.hours||"—")+'</span></div>'
    +'<div class="modal-field"><span class="modal-field-label">段差・スロープ</span><span class="modal-field-val">'+esc(d.slope||"—")+'</span></div>'
    +'</div></div>'
    +'<div class="modal-sec"><div class="modal-sec-title">自動化の目的</div><div class="modal-tags">'+purposes+'</div></div>'
    +(d.note?'<div class="modal-sec"><div class="modal-sec-title">特記事項</div><div class="modal-note">'+esc(d.note)+'</div></div>':"")
  ;
  document.getElementById("modalOverlay").classList.add("active");
}
function closeModal(e){if(!e||e.target===document.getElementById("modalOverlay"))document.getElementById("modalOverlay").classList.remove("active");}
document.addEventListener("keydown",function(e){if(e.key==="Escape")closeModal();});
["fBranch","fRep","fStatus"].forEach(function(id){document.getElementById(id).addEventListener("change",applyFilters);});
document.getElementById("fSearch").addEventListener("input",applyFilters);
init();applyFilters();
</script>
</body>
